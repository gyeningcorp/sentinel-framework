<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #0a0e1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" id="logo">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="humanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a87c"/>
      <stop offset="100%" style="stop-color:#c9784a"/>
    </linearGradient>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Center glow blob -->
  <ellipse cx="600" cy="270" rx="200" ry="150" fill="url(#centerGlow)" opacity="0.6"/>

  <!-- === HUMAN HAND (left, coming from left-bottom) === -->
  <g transform="translate(240, 180) rotate(-20)" filter="url(#softglow)">
    <!-- Palm -->
    <rect x="0" y="60" width="90" height="95" rx="12" fill="url(#humanGrad)"/>
    <!-- Thumb -->
    <rect x="-22" y="90" width="30" height="50" rx="12" fill="url(#humanGrad)" transform="rotate(-30,-7,115)"/>
    <!-- Finger 1 -->
    <rect x="5" y="0" width="22" height="72" rx="11" fill="url(#humanGrad)"/>
    <!-- Finger 2 -->
    <rect x="32" y="-10" width="22" height="78" rx="11" fill="url(#humanGrad)"/>
    <!-- Finger 3 -->
    <rect x="59" y="-5" width="22" height="74" rx="11" fill="url(#humanGrad)"/>
    <!-- Knuckle highlights -->
    <rect x="6" y="58" width="20" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="33" y="56" width="20" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="60" y="57" width="20" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <!-- Wrist -->
    <rect x="0" y="148" width="90" height="40" rx="8" fill="url(#humanGrad)" opacity="0.8"/>
  </g>

  <!-- === ROBOT HAND (right, coming from right-bottom) === -->
  <g transform="translate(870, 180) rotate(20) scale(-1,1) translate(-90,0)" filter="url(#softglow)">
    <!-- Palm -->
    <rect x="0" y="60" width="90" height="95" rx="8" fill="url(#robotGrad)"/>
    <!-- Panel lines on palm -->
    <line x1="0" y1="100" x2="90" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="45" y1="60" x2="45" y2="155" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Thumb (mechanical) -->
    <rect x="-22" y="90" width="28" height="46" rx="6" fill="url(#robotGrad)" transform="rotate(-30,-8,113)"/>
    <!-- Finger joints -->
    <!-- F1 -->
    <rect x="5" y="0" width="20" height="30" rx="5" fill="url(#robotGrad)"/>
    <rect x="5" y="33" width="20" height="28" rx="5" fill="url(#robotGrad)"/>
    <!-- F2 -->
    <rect x="32" y="-10" width="20" height="30" rx="5" fill="url(#robotGrad)"/>
    <rect x="32" y="23" width="20" height="28" rx="5" fill="url(#robotGrad)"/>
    <!-- F3 -->
    <rect x="59" y="-5" width="20" height="28" rx="5" fill="url(#robotGrad)"/>
    <rect x="59" y="26" width="20" height="28" rx="5" fill="url(#robotGrad)"/>
    <!-- Knuckle bolts -->
    <circle cx="15" cy="58" r="4" fill="#1e40af"/>
    <circle cx="42" cy="56" r="4" fill="#1e40af"/>
    <circle cx="69" cy="57" r="4" fill="#1e40af"/>
    <!-- LED strip on palm -->
    <rect x="8" y="115" width="74" height="6" rx="3" fill="#60a5fa" opacity="0.7" filter="url(#glow)"/>
    <!-- Wrist -->
    <rect x="0" y="148" width="90" height="38" rx="6" fill="#1d4ed8" opacity="0.9"/>
  </g>

  <!-- Clasped / touching area glow -->
  <ellipse cx="600" cy="290" rx="60" ry="40" fill="url(#glowGrad)" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="600" cy="285" rx="30" ry="20" fill="white" opacity="0.15" filter="url(#glow)"/>

  <!-- Connecting bar (wrists) -->
  <rect x="290" y="348" width="230" height="18" rx="9" fill="url(#humanGrad)" opacity="0.6"/>
  <rect x="680" y="348" width="230" height="18" rx="9" fill="url(#robotGrad)" opacity="0.6"/>

  <!-- Glow line across handshake -->
  <rect x="280" y="283" width="640" height="4" rx="2" fill="url(#glowGrad)" opacity="0.6" filter="url(#glow)"/>

  <!-- ⚔️ Sword icon (sentinel symbol) above text -->
  <g transform="translate(575, 410)" filter="url(#softglow)">
    <rect x="22" y="0" width="6" height="40" rx="3" fill="#93c5fd"/>
    <polygon points="25,-12 18,5 32,5" fill="#60a5fa"/>
    <rect x="12" y="24" width="26" height="5" rx="2.5" fill="#60a5fa"/>
    <rect x="22" y="40" width="6" height="14" rx="3" fill="#3b82f6"/>
  </g>

  <!-- Title -->
  <text x="600" y="490" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="900" fill="white" text-anchor="middle" letter-spacing="6">SENTINEL</text>
  <text x="600" y="540" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="14">FRAMEWORK</text>

  <!-- Subtitle -->
  <text x="600" y="578" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="400" fill="#475569" text-anchor="middle" letter-spacing="3">AGENTIC AI GOVERNANCE STANDARD</text>

  <!-- Bottom accent line -->
  <rect x="440" y="596" width="320" height="2" rx="1" fill="url(#glowGrad)" opacity="0.5"/>
</svg>

<script>
// Auto-download as PNG when loaded
window.onload = function() {
  const svg = document.getElementById('logo');
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svg);
  const img = new Image();
  const canvas = document.createElement('canvas');
  canvas.width = 1200;
  canvas.height = 630;
  img.onload = function() {
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const a = document.createElement('a');
    a.download = 'sentinel-framework-logo.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
};
</script>
</body>
</html>
